name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Lint
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: cd packages/bunpress && bun run typecheck

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Unit Test
        run: bun test

  publish-commit:
    name: publish-commit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish Commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pantry publish:commit './packages/*'
        env:
          PANTRY_REGISTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
          PANTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
